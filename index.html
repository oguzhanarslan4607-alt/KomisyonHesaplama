<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pos Komisyon Hesaplayıcı</title>
    <style>
        :root {
            --primary: #2563eb;
            --primary-dark: #1d4ed8;
            --danger: #ef4444;
            --danger-bg: #fee2e2;
            --bg-body: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #1e293b;
            --text-sub: #64748b;
            --border: #e2e8f0;
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-body);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 480px;
            padding: 20px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
        }

        .card {
            background-color: var(--bg-card);
            padding: 24px;
            border-radius: var(--radius);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            width: 100%;
        }

        h1 {
            text-align: center;
            color: var(--primary);
            font-size: 1.5rem;
            margin: 0 0 1.5rem 0;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 600;
            font-size: 0.95rem;
            color: var(--text-main);
        }

        select, input {
            width: 100%;
            height: 50px;
            padding: 0 16px;
            border: 2px solid var(--border);
            border-radius: 12px;
            font-size: 16px;
            background-color: #fff;
            color: var(--text-main);
            appearance: none;
            transition: all 0.2s ease;
        }

        .select-wrapper {
            position: relative;
        }
        .select-wrapper::after {
            content: "▼";
            font-size: 0.8rem;
            color: var(--text-sub);
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            pointer-events: none;
        }

        select:focus, input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn-group {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 12px;
            margin-top: 10px;
        }

        button {
            height: 54px;
            border: none;
            border-radius: 12px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.1s;
        }

        button:active {
            transform: scale(0.96);
        }

        .btn-calc {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .btn-clear {
            background-color: var(--danger-bg);
            color: var(--danger);
        }

        .result-box {
            background-color: #eff6ff;
            border: 1px solid #bfdbfe;
            border-radius: 12px;
            padding: 20px;
            margin-top: 24px;
            display: none;
        }

        .result-box.active {
            display: block;
            animation: slideUp 0.3s ease-out;
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
            font-size: 0.95rem;
            color: var(--text-sub);
        }

        .result-row.main {
            margin-top: 16px;
            padding-top: 16px;
            border-top: 2px dashed #bfdbfe;
            margin-bottom: 0;
            color: var(--text-main);
        }

        .val {
            font-weight: 600;
            color: var(--text-main);
        }

        .val-total {
            font-size: 1.5rem;
            color: var(--primary);
            font-weight: 800;
        }

        .badge {
            background-color: #dbeafe;
            color: #1e40af;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 700;
        }

        .error-msg {
            color: var(--danger);
            font-size: 0.9rem;
            margin-top: 8px;
            display: none;
            padding-left: 4px;
        }

        /* Yeni eklenen uyarı notu stili */
        .info-note {
            text-align: center;
            font-size: 0.85rem;
            color: var(--text-sub);
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid var(--border);
            font-style: italic;
        }

    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h1>Pos Komisyon Hesaplayıcı</h1>
        
        <div class="form-group">
            <label>Kart Ailesi</label>
            <div class="select-wrapper">
                <select id="card-select">
                    <option value="Garanti - Bonus">Garanti - Bonus</option>
                    <option value="YapıKredi - World">YapıKredi - World</option>
                    <option value="FinansBank - CardFinans">FinansBank - CardFinans</option>
                    <option value="Akbank - Axess">Akbank - Axess</option>
                    <option value="Halkbank - Paraf">Halkbank - Paraf</option>
                    <option value="İş Bankası - Maximum">İş Bankası - Maximum</option>
                    <option value="Ziraat Bankası - Combo">Ziraat Bankası - Combo</option>
                    <option value="Kuveyt Türk - Sağlam Kart">Kuveyt Türk - Sağlam Kart</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Taksit Sayısı</label>
            <div class="select-wrapper">
                <select id="installment-select">
                    <option value="1">Tek Çekim</option>
                    <option value="2">2 Taksit</option>
                    <option value="3">3 Taksit</option>
                    <option value="4">4 Taksit</option>
                    <option value="5">5 Taksit</option>
                    <option value="6">6 Taksit</option>
                    <option value="7">7 Taksit</option>
                    <option value="8">8 Taksit</option>
                    <option value="9">9 Taksit</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label>Tutar (TL)</label>
            <input type="number" id="amount-input" placeholder="0.00" inputmode="decimal" step="0.01">
            <div id="error-msg" class="error-msg">⚠️ Lütfen geçerli bir tutar girin.</div>
        </div>

        <div class="btn-group">
            <button class="btn-calc" onclick="calculate()">HESAPLA</button>
            <button class="btn-clear" onclick="clearForm()">Temizle</button>
        </div>

        <div id="result-box" class="result-box">
            <div class="result-row">
                <span>Komisyon Oranı</span>
                <span class="badge" id="rate-display">%0.00</span>
            </div>
            <div class="result-row">
                <span>Kesinti Tutarı</span>
                <span class="val" id="commission-display">0.00 ₺</span>
            </div>
            <div class="result-row main">
                <span style="font-weight: 600;">Ele Geçecek (Net)</span>
                <span class="val-total" id="net-display">0.00 ₺</span>
            </div>
        </div>

        <div class="info-note">
            ⚠️ Pos oranları her ay güncellenecektir.
        </div>

    </div>
</div>

<script>
    // 2026-01-01 Verileri
    const rates = {
        "Garanti - Bonus":          [2.95, 6.11, 7.97, 9.84, 11.71, 13.58, 15.45, 17.32, 18.88],
        "YapıKredi - World":        [2.95, 5.657, 7.526, 9.395, 11.264, 13.133, 15.002, 16.871, 18.74],
        "FinansBank - CardFinans":  [2.95, 5.66, 7.52, 9.40, 11.26, 13.13, 15.00, 16.87, 18.74],
        "Akbank - Axess":           [2.95, 5.66, 7.53, 9.40, 11.26, 13.13, 15.00, 16.87, 18.74],
        "Halkbank - Paraf":         [2.95, 5.27, 7.15, 9.03, 10.91, 12.79, 14.67, 16.56, 18.44],
        "İş Bankası - Maximum":     [2.95, 5.61, 7.47, 9.35, 11.21, 13.08, 14.95, 16.82, 18.69],
        "Ziraat Bankası - Combo":   [2.95, 5.33, 6.70, 8.01, 9.47, 10.83, 12.34, 13.61, 15.12],
        "Kuveyt Türk - Sağlam Kart":[2.95, 5.89, 7.62, 9.32, 11.00, 12.64, 14.29, 15.87, 17.41]
    };

    const els = {
        card: document.getElementById('card-select'),
        inst: document.getElementById('installment-select'),
        amt: document.getElementById('amount-input'),
        rate: document.getElementById('rate-display'),
        comm: document.getElementById('commission-display'),
        net: document.getElementById('net-display'),
        box: document.getElementById('result-box'),
        err: document.getElementById('error-msg')
    };

    const fmt = new Intl.NumberFormat('tr-TR', {
        style: 'currency',
        currency: 'TRY',
        minimumFractionDigits: 2
    });

    function calculate() {
        const val = els.amt.value.replace(',', '.');
        const amount = parseFloat(val);

        if (!amount || amount <= 0) {
            els.err.style.display = 'block';
            els.box.classList.remove('active');
            return;
        }

        els.err.style.display = 'none';
        
        const cardName = els.card.value;
        const instIndex = parseInt(els.inst.value) - 1;
        const rate = rates[cardName][instIndex];

        const comm = amount * (rate / 100);
        const net = amount - comm;

        els.rate.innerText = `%${rate.toFixed(2)}`;
        els.comm.innerText = fmt.format(comm);
        els.net.innerText = fmt.format(net);
        
        els.box.classList.add('active');
    }

    function clearForm() {
        els.amt.value = '';
        els.box.classList.remove('active');
        els.err.style.display = 'none';
        els.amt.focus();
    }

    els.amt.addEventListener("keypress", function(e) {
        if (e.key === "Enter") calculate();
    });
</script>

</body>
</html>
